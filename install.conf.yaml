- defaults:
    link:
      create: true
      relink: true

- clean: ['~']

- link:
    ~/.gitconfig: git/gitconfig
  ~/.gitconfig-private: git/gitconfig-private
  ~/.gitconfig-tv2: git/gitconfig-tv2
    ~/.gitignore: git/gitignore
    ~/.zshrc: zshrc
    ~/.fzf.zsh: fzf.zsh
    ~/.vimrc: vim/vimrc

- shell:
  - [git submodule update --init --recursive, Installing/updating submodules]
